<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engineering Projects</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main>
        <a href="{{ url_for('home') }}" class="back-link">← Back to Home</a>
        <h2>🛠️ Engineering Projects</h2>
        <div class="project-grid">
            {% for id, project in projects.items() %}
                <div class="project-card">
                    <div class="card-header">
                        <span class="project-num">{{ project.num }}</span>
                        <span class="project-tag">{{ project.tag }}</span>
                    </div>
                    <h3>{{ project.title }}</h3>
                    <p class="project-date">🗓️ {{ project.date }}</p>
                    <p>{{ project.desc }}</p>
                    
                    <div class="skills-container">
                        {% for skill in project.skills %}
                            <span class="skill-badge">{{ skill }}</span>
                        {% endfor %}
                    </div>
                    <div class="card-footer">
                        <a href="{{ url_for('project_detail', project_id=id) }}" class="btn-sm">View Case Study →</a>
                    </div>
                </div>
            {% endfor %}
        </div>
    </main>
</body>
</html>
